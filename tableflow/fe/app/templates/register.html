{% extends "base.html" %} {% block content %}
<div
  class="min-h-[80-screen] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div
    class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100"
  >
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Crear Cuenta
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Únete al equipo de TableFlow
      </p>
    </div>
    <form
      class="mt-8 space-y-4"
      action="{{ url_for('register') }}"
      method="POST"
    >
      <input
        type="text"
        name="full_name"
        placeholder="Nombre Completo"
        required
        class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      />
      <input
        type="text"
        name="username"
        placeholder="Usuario"
        required
        class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      />
      <input
        type="email"
        name="email"
        placeholder="Correo Electrónico"
        required
        class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      />
      <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
        class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      />

      <button
        type="submit"
        class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition-all"
      >
        Registrarme
      </button>
    </form>
    <div class="text-center">
      <a
        href="{{ url_for('login') }}"
        class="text-sm font-medium text-indigo-600 hover:text-indigo-500"
        >¿Ya tienes cuenta? Inicia sesión</a
      >
    </div>
  </div>
</div>
{% endblock %}
