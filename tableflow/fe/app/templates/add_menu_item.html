{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6 flex items-center space-x-2">
    <a
      href="{{ url_for('menu') }}"
      class="text-indigo-600 hover:text-indigo-800 text-sm font-medium"
      >← Volver al Menú</a
    >
  </div>

  <div class="bg-white shadow-xl rounded-lg p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Agregar Nuevo Plato</h1>

    <form action="{{ url_for('menu_add') }}" method="POST" class="space-y-6">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700"
          >Nombre del Plato</label
        >
        <input
          type="text"
          name="name"
          id="name"
          required
          class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border"
        />
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-gray-700"
          >Descripción</label
        >
        <textarea
          name="description"
          id="description"
          rows="3"
          class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border"
        ></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="price" class="block text-sm font-medium text-gray-700"
            >Precio ($)</label
          >
          <input
            type="number"
            name="price"
            id="price"
            step="0.01"
            required
            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border"
          />
        </div>

        <div>
          <label for="category" class="block text-sm font-medium text-gray-700"
            >Categoría</label
          >
          <input
            type="text"
            name="category"
            id="category"
            placeholder="Ej. Entradas, Postres"
            required
            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border"
          />
        </div>
      </div>

      <div class="flex items-start">
        <div class="flex items-center h-5">
          <input
            id="is_available"
            name="is_available"
            type="checkbox"
            checked
            class="focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-gray-300 rounded"
          />
        </div>
        <div class="ml-3 text-sm">
          <label for="is_available" class="font-medium text-gray-700"
            >Disponible inmediatamente</label
          >
          <p class="text-gray-500">
            Si se marca, el plato aparecerá en el menú de los meseros.
          </p>
        </div>
      </div>

      <div class="pt-4">
        <button
          type="submit"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
        >
          Guardar Plato en el Menú
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
