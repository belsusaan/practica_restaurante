{% extends "base.html" %} {% block content %}
<div
  class="min-h-[80-screen] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
  <div
    class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100"
  >
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        TableFlow
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Entra para gestionar tus órdenes
      </p>
    </div>
    <form class="mt-8 space-y-6" action="{{ url_for('login') }}" method="POST">
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="username" class="sr-only">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            required
            class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
            placeholder="Nombre de usuario"
          />
        </div>
        <div>
          <label for="password" class="sr-only">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
            placeholder="Contraseña"
          />
        </div>
      </div>

      <div>
        <button
          type="submit"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all"
        >
          Iniciar Sesión
        </button>
      </div>
    </form>
    <div class="text-center">
      <p class="text-sm text-gray-600">
        ¿No tienes cuenta?
        <a
          href="{{ url_for('register') }}"
          class="font-medium text-indigo-600 hover:text-indigo-500"
          >Regístrate aquí</a
        >
      </p>
    </div>
  </div>
</div>
{% endblock %}
